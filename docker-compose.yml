services:
  postgres:
    image: postgres:16
    container_name: catalog-postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  catalog-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalog-service-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: container
      DB_URL: jdbc:postgresql://postgres:5432/catalog_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8081
      DDL_AUTO: update
      APP_SECURITY_USER_USERNAME: catalog_user
      APP_SECURITY_USER_PASSWORD: userpass
      APP_SECURITY_ADMIN_USERNAME: catalog_admin
      APP_SECURITY_ADMIN_PASSWORD: adminpass
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  postgres_data:
