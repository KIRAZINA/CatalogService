spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:h2:mem:catalog_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
server:
  port: 8081
logging:
  level:
    root: INFO
    org.springframework: INFO
app:
  security:
    user:
      username: catalog_user
      password: userpass
    admin:
      username: catalog_admin
      password: adminpass
